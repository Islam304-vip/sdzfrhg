<p class="letter">
Буквица — еще один эффект, применяемый для выделения начала абзаца.
</p>

<p class="letter">
Первой букве абзаца соответствует псевдоэлемент first-letter.
</p>

<p>
Элемент <strong>strong</strong> делает текст жирным,
<em>em</em> — курсивом, а <span class="accent">span выделяет текст</span>.
</p>

<p>Так выглядит <tt>моноширинный текст</tt>.</p>

<p><abbr title="World Wide Web">WWW</abbr></p>
